apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: togglemaster
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/renanguedesgs/ToggleMaster-Microservices
    targetRevision: main
    path: k8s/common

  destination:
    server: https://kubernetes.default.svc
    namespace: fiap-tc-f2

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
