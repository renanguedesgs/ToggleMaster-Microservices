apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-application
  namespace: argocd
  labels:
    app: analytics-service
spec:
  project: default

  source:
    repoURL: https://github.com/renanguedesgs/ToggleMaster-Microservices
    targetRevision: main
    path: k8s/apps/analytics-service

  destination:
    server: https://kubernetes.default.svc
    namespace: analytics-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
