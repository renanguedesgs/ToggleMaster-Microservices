apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-application
  namespace: argocd
  labels:
    app: infra
spec:
  project: default

  source:
    repoURL: https://github.com/renanguedesgs/ToggleMaster-Microservices
    targetRevision: main
    path: k8s/apps/infra

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
