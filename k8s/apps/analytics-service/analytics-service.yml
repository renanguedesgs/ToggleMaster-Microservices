apiVersion: v1
kind: Secret
metadata:
  name: analytics-service-secret
  namespace: analytics-ns
type: Opaque
stringData:
  SERVICE_API_KEY: "tm_key_local_analytics"
  AWS_ACCESS_KEY_ID: "dummy"
  AWS_SECRET_ACCESS_KEY: "dummy"
  AWS_SESSION_TOKEN: "dummy"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config-map
  namespace: analytics-ns
data:
  AUTH_SERVICE_URL: "http://auth-service-svc.auth-ns.svc.cluster.local:8001"
  PORT: "8005"
  AWS_SQS_URL: "http://dummy-sqs:4566"
  AWS_DYNAMODB_TABLE: "ToggleMasterAnalytics"
  AWS_REGION: "us-east-1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: analytics-ns
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: analytics-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8005
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: AWS_SESSION_TOKEN
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: analytics-service-config-map
                  key: PORT
            - name: AWS_SQS_URL
              valueFrom:
                configMapKeyRef:
                  name: analytics-service-config-map
                  key: AWS_SQS_URL
            - name: AWS_DYNAMODB_TABLE
              valueFrom:
                configMapKeyRef:
                  name: analytics-service-config-map
                  key: AWS_DYNAMODB_TABLE
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: analytics-service-config-map
                  key: AWS_REGION
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: analytics-service-config-map
                  key: AUTH_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service-svc
  namespace: analytics-ns
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8005
      targetPort: 8005
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: analytics-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
