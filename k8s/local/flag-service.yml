apiVersion: v1
kind: Secret
metadata:
  name: flag-service-secret
  namespace: fiap-tc-f2
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:postgres123@postgres-svc:5432/postgres?sslmode=disable"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flag-service-config-map
  namespace: fiap-tc-f2
data:
  AUTH_SERVICE_URL: "http://auth-service-svc:8001"
  PORT: "8002"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: fiap-tc-f2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      containers:
        - name: flag-service
          image: flag-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DATABASE_URL
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: flag-service-config-map
                  key: PORT
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: flag-service-config-map
                  key: AUTH_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: flag-service-svc
  namespace: fiap-tc-f2
spec:
  selector:
    app: flag-service
  ports:
    - port: 8002
      targetPort: 8002
